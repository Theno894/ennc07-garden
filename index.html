<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>灵感花园 · Insight Garden</title>
<meta name="description" content="慢慢看见自己靠近了什么">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2f4a3c">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="灵感花园">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@600;900&family=Noto+Sans+SC:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --paper:#f2efe6; --paper2:#f7f5ee; --card:#fdfcf8; --line:#e5e1d3;
  --ink:#223428; --ink2:#41523f; --mute:#8a8d7c;
  --grow:#a9822c; --done:#4a6b52; --settle:#9c6a4e; --wait:#5f7d99; --seed:#6d7580; --release:#8d8d85;
  --accent:#2f4a3c; --danger:#a2543f;
  --serif:'Noto Serif SC',serif; --sans:'Noto Sans SC',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:linear-gradient(180deg,var(--paper) 0%,var(--paper2) 100%);color:var(--ink);font-family:var(--sans);min-height:100vh;font-size:15px;line-height:1.7}
a{color:inherit;text-decoration:none}
button{font-family:var(--sans);cursor:pointer;border:1px solid var(--line);background:var(--card);color:var(--ink);border-radius:10px;padding:8px 14px;font-size:14px;transition:.15s}
button:hover{border-color:var(--accent)}
button.primary{background:var(--accent);color:#fdfcf8;border-color:var(--accent)}
button.ghost{background:transparent;border:none;color:var(--mute);padding:4px 8px}
input,textarea,select{font-family:var(--sans);font-size:15px;color:var(--ink);background:var(--card);border:1px solid var(--line);border-radius:10px;padding:10px 12px;width:100%}
textarea{min-height:120px;resize:vertical;line-height:1.8}
input:focus,textarea:focus{outline:none;border-color:var(--accent)}

header.top{position:sticky;top:0;z-index:20;background:rgba(242,239,230,.92);backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
.topbar{max-width:1120px;margin:0 auto;display:flex;align-items:center;gap:18px;padding:14px 20px}
.logo{display:flex;align-items:center;gap:10px}
.logo svg{width:30px;height:30px}
.logo .t1{font-family:var(--serif);font-weight:900;font-size:19px;line-height:1.2}
.logo .t2{font-size:10px;letter-spacing:.25em;color:var(--mute)}
nav.desk{display:flex;gap:22px;margin-left:26px;font-size:14.5px}
nav.desk a{color:var(--ink2);padding:4px 2px;border-bottom:2px solid transparent}
nav.desk a.on{color:var(--ink);border-color:var(--accent);font-weight:500}
.top-right{margin-left:auto;display:flex;align-items:center;gap:14px;font-size:13.5px;color:var(--mute)}

main{max-width:1120px;margin:0 auto;padding:34px 20px 110px}
.eyebrow{font-size:12.5px;letter-spacing:.12em;color:var(--accent);font-weight:500;margin-bottom:10px}
h1.hero{font-family:var(--serif);font-weight:900;font-size:clamp(28px,4.6vw,44px);line-height:1.25;margin-bottom:10px}
.sub{color:var(--mute);margin-bottom:26px}
h2.sec{font-family:var(--serif);font-weight:600;font-size:21px;margin:34px 0 14px}

.grid{display:grid;gap:14px}
.g2{grid-template-columns:repeat(auto-fit,minmax(300px,1fr))}
.g3{grid-template-columns:repeat(auto-fit,minmax(240px,1fr))}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px 20px}
.card h3{font-family:var(--serif);font-weight:600;font-size:17.5px;margin:6px 0}
.card .desc{color:var(--ink2);font-size:14px}
.muted{color:var(--mute);font-size:13.5px}
.row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.spread{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}

.chip{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;border-radius:999px;padding:3px 11px;background:var(--paper);border:1px solid var(--line);color:var(--ink2)}
.chip .dot{width:7px;height:7px;border-radius:50%;background:var(--mute)}
.chip.seed .dot{background:var(--seed)} .chip.growing .dot{background:var(--grow)}
.chip.waiting .dot{background:var(--wait)} .chip.done .dot{background:var(--done)}
.chip.settled .dot{background:var(--settle)} .chip.released .dot{background:var(--release)}
.chip.sel{background:var(--accent);color:#fdfcf8;border-color:var(--accent)}
.chip.click{cursor:pointer}

.bar{height:7px;border-radius:99px;background:var(--paper);border:1px solid var(--line);overflow:hidden;margin:12px 0 6px}
.bar i{display:block;height:100%;background:linear-gradient(90deg,#5b7a5e,#31493a);border-radius:99px}

.bignum{font-family:var(--serif);font-weight:900;font-size:34px}
.note{background:#e7ebe9;border:1px solid #d5dcd8;border-radius:16px;padding:16px 20px}
.toast{position:fixed;left:50%;bottom:92px;transform:translateX(-50%);background:var(--accent);color:#fdfcf8;padding:10px 18px;border-radius:12px;font-size:14px;z-index:99;opacity:0;transition:.25s;pointer-events:none}
.toast.show{opacity:1}

nav.mob{display:none;position:fixed;left:12px;right:12px;bottom:12px;z-index:30;background:rgba(253,252,248,.95);border:1px solid var(--line);border-radius:20px;box-shadow:0 8px 30px rgba(34,52,40,.10);padding:8px 6px}
nav.mob .wrap{display:flex;justify-content:space-around;align-items:center}
nav.mob a{display:flex;flex-direction:column;align-items:center;gap:2px;font-size:11.5px;color:var(--mute);padding:4px 8px}
nav.mob a .ic{width:30px;height:30px;border-radius:50%;background:var(--paper);display:flex;align-items:center;justify-content:center;font-size:13px;font-family:var(--serif)}
nav.mob a.on{color:var(--ink)} nav.mob a.on .ic{background:var(--accent);color:#fdfcf8}

.login-wrap{max-width:420px;margin:12vh auto 0;padding:0 20px}
.login-card{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:30px 28px;text-align:center}
.login-card h1{font-family:var(--serif);font-weight:900;font-size:26px;margin-bottom:6px}
.login-card p{color:var(--mute);font-size:14px;margin-bottom:20px}
.login-card input{text-align:center;margin-bottom:12px}
.hidden{display:none!important}
.growcard{cursor:pointer}
.card-tools{display:none}
.growcard.open .card-tools{display:block}
.tool-hint{font-size:12px;margin-top:10px;text-align:right;user-select:none}
.projcard{cursor:pointer;transition:border-color .15s}
.projcard:hover{border-color:var(--accent)}
.modal-mask{position:fixed;inset:0;background:rgba(34,52,40,.34);z-index:50;display:flex;align-items:flex-start;justify-content:center;padding:40px 16px;overflow:auto}
.modal{background:var(--card);border:1px solid var(--line);border-radius:20px;max-width:640px;width:100%;padding:24px 26px;box-shadow:0 20px 60px rgba(34,52,40,.22)}
.modal h2{font-family:var(--serif);font-weight:900;font-size:22px;margin:6px 0}
.check{display:flex;align-items:center;gap:10px;padding:9px 0;border-top:1px dashed var(--line)}
.check:first-of-type{border-top:none}
.check input{width:auto}
.check .tt{flex:1}
.check .tt.done{text-decoration:line-through;color:var(--mute)}
.timeline{border-left:2px solid var(--line);padding-left:14px}
.timeline .ev{position:relative;padding:6px 0}
.timeline .ev::before{content:'';position:absolute;left:-19px;top:12px;width:8px;height:8px;border-radius:50%;background:var(--done)}
.itemline{border-top:1px dashed var(--line);padding:10px 0;display:flex;gap:10px;align-items:flex-start;justify-content:space-between}
.itemline:first-of-type{border-top:none}
.cap-grid{display:grid;gap:14px;grid-template-columns:1.6fr 1fr}
.card-done{opacity:.66}
.chip{white-space:nowrap}
.itemline{gap:10px}
.itemline>div{min-width:0}
.itemline .chip{flex-shrink:0}
.spread>.chip,.spread .row{flex-shrink:0}
.itemline.click{cursor:pointer;border-radius:8px}
.itemline.click:hover{background:var(--paper)}
.exp{font-weight:500}
.small-in{width:auto;flex:1}
@media (max-width:760px){
  nav.desk{display:none} nav.mob{display:block} main{padding-top:24px}
  #date-label{display:none}
  .logo .t2, .logo br{display:none}
  .logo .t1{font-size:18px}
  .logo svg{width:26px;height:26px}
  .topbar{padding:12px 16px;gap:8px}
  .top-right{gap:8px;margin-left:auto}
  .top-right button{white-space:nowrap;padding:6px 10px;font-size:13px}
  .cap-grid{grid-template-columns:1fr}
  .g3{grid-template-columns:1fr}
}
</style>
</head>
<body>

<header class="top" id="hdr">
  <div class="topbar">
    <a class="logo" href="#today">
      <svg viewBox="0 0 32 32"><circle cx="13" cy="21" r="8" fill="#2f4a3c"/><path d="M14 20 C14 10, 22 4, 30 4 C30 14, 22 20, 14 20 Z" fill="#4a6b52"/></svg>
      <span><span class="t1">灵感花园</span><br><span class="t2">INSIGHT GARDEN</span></span>
    </a>
    <nav class="desk" id="nav-desk"></nav>
    <div class="top-right"><span id="date-label"></span><button class="ghost" id="btn-setpass" title="设置密码">设密码</button><button class="ghost" id="btn-logout" title="退出登录">退出</button></div>
  </div>
</header>

<div class="login-wrap hidden" id="login-view">
  <div class="login-card">
    <h1>灵感花园</h1>
    <p>用邮箱 + 密码登录。第一次没有密码?用下面的邮件链接先进来,再设密码。</p>
    <input type="email" id="login-email" placeholder="你的邮箱" autocomplete="email">
    <input type="password" id="login-pass" placeholder="密码" autocomplete="current-password" style="margin-top:10px">
    <button class="primary" id="btn-pass" style="width:100%;margin-top:12px">登录</button>
    <p class="muted" id="login-msg" style="margin-top:14px"></p>
    <div style="border-top:1px solid var(--line);margin-top:16px;padding-top:14px">
      <button class="ghost" id="btn-magic" style="width:100%">第一次?发一封邮件链接给我</button>
      <div id="otp-box" class="hidden" style="margin-top:10px">
        <input type="text" id="login-code" placeholder="或输入邮件里的 6 位码" inputmode="numeric" autocomplete="one-time-code" style="text-align:center;letter-spacing:4px">
        <button id="btn-verify" style="width:100%;margin-top:8px">用验证码进入</button>
      </div>
    </div>
  </div>
</div>

<main id="view"></main>

<nav class="mob" id="nav-mob"></nav>
<div class="toast" id="toast"></div>

<script>
/* ================= 配置(部署时唯二要改的地方) ================= */
const SUPABASE_URL      = 'https://pclcxosllotopkrevqtp.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_JmFJq9iR32egjetXxvOTtw_Y88-BJEI'; // publishable key,可公开
const OWNER_NAME = 'Dou';

/* ================= 基础 ================= */
const configured = SUPABASE_URL.startsWith('https://');
const sb = configured ? supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY) : null;
let session = null;

const $  = s => document.querySelector(s);
const esc = s => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const todayStr = () => { const d = new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); };
const fmtMD = s => { if(!s) return ''; const d = new Date(s); return (d.getMonth()+1)+'/'+String(d.getDate()).padStart(2,'0'); };
function toast(msg){ const t=$('#toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2200); }
function greeting(){
  const h = new Date().getHours();
  const g = h<5?'夜深了':h<11?'早安':h<13?'午安':h<18?'午后好':h<23?'晚上好':'夜深了';
  return g + ',' + OWNER_NAME;
}
async function q(promise, silent){
  const { data, error } = await promise;
  if (error && !silent){ console.error(error); toast('出了点小差错:' + error.message.slice(0,40)); }
  return data;
}
const STATUS_ZH = {seed:'待处理', growing:'正在生长', waiting:'等待中', done:'已完成', settled:'已沉淀', released:'已放下'};
const chip = st => `<span class="chip ${st}"><span class="dot"></span>${STATUS_ZH[st]||st}</span>`;

/* ================= 导航与路由 ================= */
const TABS = [ ['today','今日','今'], ['capture','捕捉','＋'], ['grow','生长','芽'], ['projects','项目','进'], ['lang','语言温室','语'], ['create','创作','作'], ['review','回顾','看'] ];
function renderNav(){
  const cur = location.hash.replace('#','') || 'today';
  $('#nav-desk').innerHTML = TABS.map(([id,name]) => `<a href="#${id}" class="${cur===id?'on':''}">${name}</a>`).join('');
  $('#nav-mob').innerHTML = '<div class="wrap">' + TABS.map(([id,name,ic]) => `<a href="#${id}" class="${cur===id?'on':''}"><span class="ic">${ic}</span>${name}</a>`).join('') + '</div>';
  const d = new Date();
  $('#date-label').textContent = (d.getMonth()+1)+'月'+d.getDate()+'日 '+['周日','周一','周二','周三','周四','周五','周六'][d.getDay()];
}
/* ================= 登录 ================= */
async function initAuth(){
  if (!configured){
    $('#hdr').classList.add('hidden');
    $('#view').innerHTML = `<div class="login-wrap"><div class="login-card"><h1>还差一步</h1>
      <p>index.html 顶部的 SUPABASE_URL / SUPABASE_ANON_KEY 还没填。填好后花园就会醒来。</p></div></div>`;
    return false;
  }
  const { data } = await sb.auth.getSession();
  session = data.session;
  sb.auth.onAuthStateChange((_e, s) => { session = s; showApp(); });
  showApp();
  return true;
}
function showApp(){
  if (!session){
    $('#hdr').classList.add('hidden'); $('#nav-mob').classList.add('hidden');
    $('#login-view').classList.remove('hidden'); $('#view').innerHTML = '';
  } else {
    $('#hdr').classList.remove('hidden'); $('#nav-mob').classList.remove('hidden');
    $('#login-view').classList.add('hidden');
    route();
  }
}
async function sendMagic(){
  const email = $('#login-email').value.trim();
  if (!email) return;
  $('#login-msg').textContent = '寄送中…';
  const { error } = await sb.auth.signInWithOtp({ email, options: { emailRedirectTo: location.origin + location.pathname } });
  if (error){ $('#login-msg').textContent = '没寄出去:' + error.message; return; }
  $('#otp-box').classList.remove('hidden');
  $('#login-msg').textContent = '已寄出。把邮件里的 6 位码填进来,或直接点邮件里的链接。';
  $('#login-code').focus();
}
async function verifyCode(){
  const email = $('#login-email').value.trim();
  const token = $('#login-code').value.trim();
  if (!email || !token) return;
  $('#login-msg').textContent = '验证中…';
  const { error } = await sb.auth.verifyOtp({ email, token, type: 'email' });
  if (error) $('#login-msg').textContent = '码不对或已过期:' + error.message;
  // 成功后 onAuthStateChange 会自动进入花园
}
async function passLogin(){
  const email = $('#login-email').value.trim(), password = $('#login-pass').value;
  if (!email || !password){ $('#login-msg').textContent = '请输入邮箱和密码'; return; }
  $('#login-msg').textContent = '登录中…';
  const { error } = await sb.auth.signInWithPassword({ email, password });
  if (error) $('#login-msg').textContent = '登录失败:' + error.message + '(第一次请点下面的邮件链接)';
  // 成功后 onAuthStateChange 自动进入
}
function setPassword(){
  if (document.querySelector('.modal-mask')) return;
  document.body.insertAdjacentHTML('beforeend', `
   <div class="modal-mask"><div class="modal" style="max-width:420px">
    <div class="spread"><b>设置登录密码</b><button class="ghost" data-mclose style="font-size:16px">✕</button></div>
    <p class="muted" style="margin:10px 0">设一个密码,以后在手机上用「邮箱 + 密码」直接登录,不用再等邮件。</p>
    <input type="password" id="np" placeholder="新密码(至少 6 位)" autocomplete="new-password">
    <button class="primary" id="np-save" style="width:100%;margin-top:12px">保存密码</button>
    <p class="muted" id="np-msg" style="margin-top:10px"></p>
   </div></div>`);
  const mask = document.querySelector('.modal-mask');
  mask.querySelector('[data-mclose]').onclick = () => mask.remove();
  mask.addEventListener('click', ev => { if (ev.target===mask) mask.remove(); });
  mask.querySelector('#np-save').onclick = async () => {
    const p = mask.querySelector('#np').value.trim();
    if (p.length < 6){ mask.querySelector('#np-msg').textContent = '密码至少 6 位'; return; }
    const { error } = await sb.auth.updateUser({ password: p });
    mask.querySelector('#np-msg').textContent = error ? ('没设成:' + error.message) : '密码已设置!以后手机上用邮箱 + 密码登录 🌱';
    if (!error) setTimeout(() => mask.remove(), 1600);
  };
}

/* ================= 路由 ================= */
const VIEWS = {};
const langUI = { libOpen:false, q:'', filter:'全部', sort:'recent' };  // 词库 UI 状态(跨渲染保留)
let growView = 'list';  // 生长页:列表 or 星图
async function route(){
  if (!session) return;
  renderNav();
  const cur = location.hash.replace('#','') || 'today';
  ($('#view').innerHTML = '<p class="muted">花园加载中…</p>');
  await (VIEWS[cur] || VIEWS.today)();
  window.scrollTo(0,0);
}

/* ================= 今日 ================= */
VIEWS.today = async function(){
  const today = todayStr();
  const [ds, projs, seeds, checkins, brief, langAll] = await Promise.all([
    q(sb.from('daily_state').select('*').eq('date', today).maybeSingle(), true),
    q(sb.from('projects').select('*').eq('status','growing').order('updated_at',{ascending:false})),
    q(sb.from('entries').select('*').in('status',['seed','growing']).order('updated_at',{ascending:false})),
    q(sb.from('lang_checkins').select('*').eq('date', today)),
    q(sb.from('mail_briefs').select('*').order('date',{ascending:false}).limit(1)),
    q(sb.from('lang_items').select('*').eq('mastered', false)),
  ]);
  const en = (checkins||[]).find(c=>c.lang==='en'), ja = (checkins||[]).find(c=>c.lang==='ja');
  const b = (brief||[])[0];
  const energy = ds?.energy || 'mid';

  // 每日固定待办:按能量定数量、至多 1 颗灵感种子;完成显示"已完成",不再往上顶新的
  let acts = ds?.actions || {};
  const snoozed = acts.snoozed || [];
  const doneToday = acts.done || [];
  const notSnoozed = arr => arr.filter(x => !snoozed.includes(x.sid));
  const dueLang = (langAll||[]).filter(i => !i.last_reviewed_at ||
    (Date.now() - new Date(i.last_reviewed_at).getTime()) > Math.pow(2, i.review_count) * 86400000);
  const projCands = notSnoozed((projs||[]).map(p=>({t:'项目', title:p.name, sub:p.next_step||p.description||'', st:p.status, go:'proj', gid:p.id, sid:p.id})));
  const seedCands = notSnoozed((seeds||[]).map(e=>({t:e.kind, title:e.title||e.content.slice(0,18), sub:(e.content||'').slice(0,42), st:e.status, go:'grow', gid:e.id, sid:e.id})));
  const langCands = notSnoozed(dueLang.map(i=>({t:i.lang==='en'?'英语':'日语', title:i.expression, sub:'点开翻面复习', st:'growing', go:'lang', gid:i.id, sid:i.id})));
  const interleave = arrs => { const out=[]; for(let i=0;out.length<50;i++){ let any=false; for(const a of arrs){ if(a[i]){ out.push(a[i]); any=true; } } if(!any) break; } return out; };
  const energyNeed = {low:2, mid:3, high:5}[energy];
  const energyLabel = {low:'低能量',mid:'中等能量',high:'高能量'}[energy];
  const pickOne = arr => arr.length ? arr[Math.floor(Math.random()*arr.length)] : null;
  // 只在每天第一次(或能量变化时)选一次,之后固定不变
  let todo = acts.todo;
  if (!Array.isArray(todo) || acts.todoEnergy !== energy){
    const others = interleave([projCands, langCands]);        // 项目 + 到期语言
    const seed = pickOne(seedCands);                           // 至多 1 颗灵感种子
    const list = seed ? [seed] : [];
    for (const o of others){ if (list.length >= energyNeed) break; list.push(o); }
    todo = list.slice(0, energyNeed);
    acts = { ...acts, todo, todoEnergy: energy };
    await q(sb.from('daily_state').upsert({ date: today, energy, actions: acts, updated_at: new Date().toISOString() }), true);
  }
  const doneCount = todo.filter(x => doneToday.includes(x.sid)).length;
  const eBtn = (v,label,tip) => `<button data-energy="${v}" class="${energy===v?'primary':''}" style="flex:1;text-align:left"><b>${label}</b><br><span class="muted" style="font-size:12px">${tip}</span></button>`;
  $('#view').innerHTML = `
    <div class="eyebrow">${esc(greeting())}</div>

VIEWS.capture = async function(){
  const recent = await q(sb.from('entries').select('*').order('created_at',{ascending:false}).limit(5)) || [];
  const KINDS = ['灵感','学习','项目','生活','英语','日语'];
  $('#view').innerHTML = `
    <div class="eyebrow">统一捕捉</div>
    <h1 class="hero">只需要说一次,花园会先保留原句</h1>
    <p class="sub">选择只是第一层整理;英语/日语会直接落进语言温室。</p>
    <div class="cap-grid">
      <div class="card">
        <textarea id="cap-text" placeholder="写下一句话。它可以是想法、进展、身体感受,或刚学到的一句表达……"></textarea>
        <div class="row" style="margin:14px 0">${KINDS.map(k=>`<span class="chip click" data-kind="${k}">${k}</span>`).join('')}</div>
        <div class="spread"><span class="muted" id="cap-hint">写点什么,我猜猜它属于哪里</span><button class="primary" id="cap-save">种进花园</button></div>
      </div>
      <div class="card"><div class="muted">最近留下的原句</div>
        ${recent.map(e=>`<div class="itemline"><div><div class="muted">${esc(e.kind)} · ${fmtMD(e.occurred_on)}</div><div class="desc">${esc((e.title||e.content).slice(0,42))}</div></div>${chip(e.status)}</div>`).join('') || '<p class="muted" style="margin-top:10px">还没有记录</p>'}
      </div>
    </div>`;
  let kind = null;
  const chips = document.querySelectorAll('[data-kind]');
  const guess = t => {
    if (/[぀-ヿ]/.test(t)) return '日语';
    const ascii = (t.match(/[a-zA-Z\s'.,!?-]/g)||[]).length;
    if (t.length > 4 && ascii / t.length > 0.7) return '英语';
    if (/项目|上线|进度|交付|部署/.test(t)) return '项目';
    if (/学到|复习|背|读了|课/.test(t)) return '学习';
    if (/吃|睡|散步|家|买|身体/.test(t)) return '生活';
    return '灵感';
  };
  const syncChips = () => chips.forEach(c => c.classList.toggle('sel', c.dataset.kind === kind));
  chips.forEach(c => c.onclick = () => { kind = c.dataset.kind; syncChips(); });
  $('#cap-text').oninput = e => { if (!kind) { $('#cap-hint').textContent = '看起来像:' + guess(e.target.value); } };
  $('#cap-save').onclick = async () => {
    const text = $('#cap-text').value.trim();
    if (!text) return toast('先写点什么');
    const k = kind || guess(text);
    if (k === '英语' || k === '日语'){
      const lang = k === '英语' ? 'en' : 'ja';
      const { data: ins } = await sb.from('lang_items').insert({ lang, expression: text, source: 'manual' }).select().single();
      await bumpCheckin(lang, 1);
      toast(k + '表达已收进温室，AI 补释义中… 🌱');
      // 后台补释义(不阻塞)
      if (ins) sb.functions.invoke('garden-ai', { body:{ mode:'lookup', expression: text, lang, direction:'forward' } })
        .then(({ data }) => { if (data?.card){ const c=data.card; const meaning=[c.pron,c.pos,c.meaning].filter(Boolean).join(' '); const example=[c.example,c.example_cn].filter(Boolean).join(' / '); sb.from('lang_items').update({ meaning: meaning||null, example: example||null }).eq('id', ins.id); } })
        .catch(()=>{});
    } else {
      await q(sb.from('entries').insert({ kind: k, content: text, title: text.slice(0, 24), status: 'seed' }));
      toast('已种下,先安静待在「' + k + '」里');
    }
    $('#cap-text').value = ''; kind = null; syncChips(); route();
  };
};
async function bumpCheckin(lang, n){
  const today = todayStr();
  const cur = await q(sb.from('lang_checkins').select('*').eq('date',today).eq('lang',lang).maybeSingle(), true);
  await q(sb.from('lang_checkins').upsert({ date: today, lang, items_added: (cur?.items_added||0) + n }));
}

/* ================= 灵感星图 ================= */
const CLUSTERS = [
  { key:'商业', name:'赚钱与商业', color:'#BA7517', tags:['商业','销售','变现','影响力','稀缺','路径','信任','风口','力量','显化','金钱心理','marketing','商业模式'] },

  { key:'自我', name:'自我·坚持·家庭', color:'#D85A30', tags:['坚持自我','原生家庭','自我认知','接纳','觉醒','舆论','潜意识','自我','成长'] },
  { key:'修行', name:'修行·命运·因果', color:'#7F77DD', tags:['修行','佛法','命运','因果','能量','发愿','感恩','养生','精气神','评判','摘抄'] },
  { key:'认知', name:'AI·认知·跨学科', color:'#378ADD', tags:['AI','create-to-learn','跨学科','能量信息','认知','语言','金刚经','科技','能力','未来','方法论','标准化','专精','成长系统','学习'] },
  { key:'处世', name:'处世·关系·投资', color:'#888780', tags:['处世','原则','关系','投资','周期','组织','战略','权力','平等','决断','勇气','决策'] },
];
const OTHER = { key:'其他', name:'新芽', color:'#B4B2A9' };
const CROSS = [['商业','修行'],['认知','修行'],['自我','创业'],['认知','自我']];
function clusterOf(e){ const tg=e.tags||[]; for(const c of CLUSTERS){ if(tg.some(t=>c.tags.includes(t))) return c; } return OTHER; }
function renderStar(entries){
  const wrap = document.getElementById('starwrap'); if(!wrap) return;
  const W=800, H=520, cx=W/2, cy=H/2;
  const groups = {}; CLUSTERS.forEach(c=>groups[c.key]={ c, items:[] });
  const other = { c:OTHER, items:[] };
  (entries||[]).forEach(e=>{ const c=clusterOf(e); (groups[c.key]||other).items.push(e); });
  const active = [...CLUSTERS.map(c=>groups[c.key]).filter(g=>g.items.length), ...(other.items.length?[other]:[])];
  const n = active.length || 1;
  const centers = {};
  active.forEach((g,i)=>{ const a=-Math.PI/2 + i/n*2*Math.PI; g.x=cx+258*Math.cos(a); g.y=cy+182*Math.sin(a); centers[g.c.key]={x:g.x,y:g.y}; });
  let lines='', dots='', labels='';
  active.forEach(g=>{ lines+=`<line x1="${cx}" y1="${cy}" x2="${g.x.toFixed(0)}" y2="${g.y.toFixed(0)}" stroke="var(--line)" stroke-width="1"/>`; });
  CROSS.forEach(([a,b])=>{ if(centers[a]&&centers[b]) lines+=`<line x1="${centers[a].x.toFixed(0)}" y1="${centers[a].y.toFixed(0)}" x2="${centers[b].x.toFixed(0)}" y2="${centers[b].y.toFixed(0)}" stroke="var(--mute)" stroke-width="1" stroke-dasharray="3 6" opacity="0.5"/>`; });
  active.forEach(g=>{
    const m=g.items.length;
    g.items.forEach((e,j)=>{
      const a = j/Math.max(m,1)*2*Math.PI + g.x*0.02;
      const r = 26 + (j%4)*14;
      const sx=g.x+r*Math.cos(a), sy=g.y+r*Math.sin(a);
      lines+=`<line x1="${g.x.toFixed(0)}" y1="${g.y.toFixed(0)}" x2="${sx.toFixed(1)}" y2="${sy.toFixed(1)}" stroke="${g.c.color}" stroke-width="0.6" opacity="0.3"/>`;
      dots+=`<circle class="star" data-id="${e.id}" cx="${sx.toFixed(1)}" cy="${sy.toFixed(1)}" r="5" fill="${g.c.color}" style="cursor:pointer"><title>${esc(e.title||(e.content||'').slice(0,20))}</title></circle>`;
    });
    dots+=`<circle cx="${g.x.toFixed(0)}" cy="${g.y.toFixed(0)}" r="3" fill="${g.c.color}"/>`;
    const w = g.c.name.length*13 + 12;
    labels+=`<rect x="${(g.x-w/2).toFixed(0)}" y="${(g.y-11).toFixed(0)}" width="${w}" height="20" rx="5" fill="var(--paper)" opacity="0.88"/>`;
    labels+=`<text x="${g.x.toFixed(0)}" y="${(g.y+4).toFixed(0)}" text-anchor="middle" font-size="12.5" fill="${g.c.color}">${esc(g.c.name)}</text>`;
  });
  dots+=`<circle cx="${cx}" cy="${cy}" r="7" fill="var(--accent)"/>`;
  labels+=`<rect x="${cx-16}" y="${cy-11}" width="32" height="20" rx="5" fill="var(--paper)" opacity="0.9"/><text x="${cx}" y="${cy+4}" text-anchor="middle" font-size="13" fill="var(--ink)">你</text>`;
  wrap.innerHTML = `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;display:block">${lines}${dots}${labels}</svg>
    <div class="muted" style="text-align:center;font-size:12px;padding:4px 0 8px">共 ${(entries||[]).length} 颗 · 点星星打开它 · 虚线是主题之间的暗线</div>`;
  wrap.querySelectorAll('.star').forEach(s => s.onclick = () => openSeed(s.dataset.id));
}

async function recomputeProgress(id){
  const tasks = await q(sb.from('project_tasks').select('done').eq('project_id', id)) || [];
  if (!tasks.length) return;
  const prog = Math.round(tasks.filter(t=>t.done).length / tasks.length * 100);
  await q(sb.from('projects').update({ progress: prog, status: prog>=100?'done':'growing', updated_at: new Date().toISOString() }).eq('id', id));
}
function closeModal(refresh){ const m = document.querySelector('.modal-mask'); if (m) m.remove(); if (refresh) route(); }
async function openProject(id){

async function calcStreak(){
  const rows = await q(sb.from('lang_checkins').select('date')) || [];
  const days = [...new Set(rows.map(r=>r.date))].sort().reverse();
  let streak = 0; const d = new Date();
  if (!days.includes(todayStr())) d.setDate(d.getDate()-1); // 今天还没打卡就从昨天数
  for (;;){
    const s = d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    if (days.includes(s)){ streak++; d.setDate(d.getDate()-1); } else break;
  }
  return streak;
}

/* 专注复习:一次一张卡 */
async function srsMark(i, kind){
  if (kind === 'remembered') return q(sb.from('lang_items').update({ review_count: (i.review_count||0)+1, last_reviewed_at: new Date().toISOString() }).eq('id', i.id));
  if (kind === 'forgot')     return q(sb.from('lang_items').update({ review_count: 0, last_reviewed_at: new Date().toISOString() }).eq('id', i.id));
  if (kind === 'mastered')   return q(sb.from('lang_items').update({ mastered: true }).eq('id', i.id));
}

    document.body.insertAdjacentHTML('beforeend', `
     <div class="modal-mask"><div class="modal" style="max-width:520px;text-align:center">
      <div class="spread"><span class="chip">${i.lang==='en'?'英语':'日语'}</span><span class="muted">${idx+1} / ${list.length}</span></div>
      <h2 style="margin:28px 0 10px;font-size:26px">${esc(i.expression)}</h2>
      <div id="rev-mean" class="hidden"><div style="margin:6px 0">${esc(i.meaning||'(没写意思,凭感觉回想)')}</div>${i.example?`<div class="muted" style="font-size:13px">${esc(i.example)}</div>`:''}</div>
      <button id="rev-flip" class="ghost" style="margin:6px 0 18px">翻面看答案 ↺</button>
      <div class="row" style="justify-content:center">
        <button data-r="forgot">没记住 ↻</button>
        <button data-r="remembered">记得 ✓</button>
        <button data-r="mastered">已长成 🌿</button>
      </div>
     </div></div>`);
    const mask = document.querySelector('.modal-mask');
    mask.addEventListener('click', ev => { if (ev.target === mask){ mask.remove(); route(); } });
    mask.querySelector('#rev-flip').onclick = () => mask.querySelector('#rev-mean').classList.remove('hidden');
    mask.querySelectorAll('[data-r]').forEach(b => b.onclick = async () => { await srsMark(i, b.dataset.r); idx++; render(); });
  };
  render();
}

/* ================= 创作 ================= */
const PLAT = { xiaohongshu:'小红书', x:'X', blog:'长文' };
const DSTAT = { draft:'草稿', ready:'待发', published:'已发' };
VIEWS.create = async function(){
  const drafts = await q(sb.from('drafts').select('*').order('updated_at',{ascending:false}), true) || [];
  $('#view').innerHTML = `
    <div class="eyebrow">创作</div>
    <h1 class="hero">让灵感长成作品</h1>
    <p class="sub">这里是灵感的出口。挑一颗种子,和我聊聊,它就能长成一篇能发的稿。</p>
    <div style="margin-bottom:16px"><button class="primary" id="d-new">＋ 新建空白稿</button></div>
    <div class="grid g2">
      ${drafts.length ? drafts.map(d=>`<div class="card projcard" data-draft="${d.id}">
        <div class="spread"><span class="chip">${PLAT[d.platform]||d.platform}</span><span class="chip ${d.status==='published'?'done':d.status==='ready'?'growing':'seed'}"><span class="dot"></span>${DSTAT[d.status]||d.status}</span></div>
        <h3>${esc(d.title)}</h3>
        <div class="desc">${esc((d.content_md||'').replace(/\s+/g,' ').slice(0,64))}…</div>
        <div class="tool-hint muted">点开看全文 →</div>
      </div>`).join('') : '<div class="card"><div class="desc">还没有作品。跟我说一句「帮我把某某灵感写成小红书」,写好我就放进这里;也可以点上面新建。</div></div>'}
    </div>`;
  $('#d-new').onclick = async () => {
    const title = prompt('标题:'); if (!title) return;
    await q(sb.from('drafts').insert({ title, content_md:'', platform:'xiaohongshu', status:'draft' }));
    toast('新建了一篇'); route();
  };
  document.querySelectorAll('[data-draft]').forEach(c => c.onclick = () => openDraft(c.dataset.draft));
};
async function openDraft(id){
  const { data: d } = await sb.from('drafts').select('*').eq('id', id).maybeSingle();
  if (!d) return;
  closeModal(false);
  document.body.insertAdjacentHTML('beforeend', `
   <div class="modal-mask"><div class="modal">
    <div class="spread"><span class="chip">${PLAT[d.platform]||d.platform} · ${DSTAT[d.status]}</span><button class="ghost" data-mclose style="font-size:16px">✕</button></div>
    <h2>${esc(d.title)}</h2>
    ${d.source?`<div class="muted" style="font-size:12px;margin-bottom:8px">来源:${esc(d.source)}</div>`:''}
    <div class="desc" style="white-space:pre-wrap;border-top:1px solid var(--line);padding-top:12px">${esc(d.content_md||'(还没有内容,可点编辑或让 Claude 帮你写)')}</div>
    <div class="row" style="margin-top:16px">
      <button class="primary" data-dcopy>📋 复制全文</button>
      <button data-dstatus="ready" ${d.status==='ready'?'disabled':''}>标记待发</button>
      <button data-dstatus="published" ${d.status==='published'?'disabled':''}>标记已发</button>
    </div>
    <div class="row" style="margin-top:10px">
      <button class="ghost" data-dedit>✎ 编辑</button>
      <button class="ghost" data-ddel style="color:var(--danger)">删除</button>
    </div>
   </div></div>`);
  const mask = document.querySelector('.modal-mask');
  mask.addEventListener('click', ev => { if (ev.target===mask) closeModal(true); });
  mask.querySelector('[data-mclose]').onclick = () => closeModal(true);
  mask.querySelector('[data-dcopy]').onclick = async () => { try { await navigator.clipboard.writeText(d.content_md||''); toast('已复制,去粘贴发布吧 📋'); } catch(e){ toast('复制失败,请手动选择文字'); } };
  mask.querySelectorAll('[data-dstatus]').forEach(b => b.onclick = async () => { await q(sb.from('drafts').update({ status:b.dataset.dstatus, updated_at:new Date().toISOString() }).eq('id', id)); toast('状态已更新'); openDraft(id); });
  mask.querySelector('[data-dedit]').onclick = async () => { const t=prompt('标题:', d.title); if(t===null) return; const c=prompt('正文(整段替换):', d.content_md||''); if(c===null) return; await q(sb.from('drafts').update({ title:t, content_md:c, updated_at:new Date().toISOString() }).eq('id', id)); openDraft(id); };
  mask.querySelector('[data-ddel]').onclick = async () => { if(!confirm('删除「'+d.title+'」?')) return; await q(sb.from('drafts').delete().eq('id', id)); toast('已删除'); closeModal(true); };
}

/* ================= 回顾 ================= */
VIEWS.review = async function(){
  const [entries, projs, insights] = await Promise.all([
    q(sb.from('entries').select('*')),
    q(sb.from('projects').select('*')),
    q(sb.from('ai_insights').select('*').eq('scope','weekly_review').order('date',{ascending:false}).limit(1)),
  ]);
  const all = [...(entries||[]).map(e=>({st:e.status})), ...(projs||[]).map(p=>({st:p.status}))];
  const cnt = st => all.filter(x=>x.st===st).length;
  const CARDS = [ ['seed','值得关注,但还没有开始'], ['growing','已经开始,也有下一步'], ['waiting','暂时交给外部条件'], ['done','这次行动已经结束'], ['settled','已经形成可复用的成果'], ['released','经过判断后安心不再继续'] ];
  const weekAgo = new Date(Date.now() - 6*86400000);
  const thisWeek = (entries||[]).filter(e => new Date(e.occurred_on) >= weekAgo)
    .sort((a,b)=>b.occurred_on.localeCompare(a.occurred_on));
  const ins = (insights||[])[0];
  const total = (entries||[]).length;
  $('#view').innerHTML = `
    <div class="eyebrow">这一周的生长</div>
    <h1 class="hero">慢慢看见自己靠近了什么</h1>
    <p class="sub">${total} 条记录留在花园里,${cnt('done')+cnt('settled')} 项已经完成或沉淀。</p>
    <div class="spread" style="margin-bottom:14px"><span></span><button id="btn-export">导出花园数据</button></div>
    <div class="grid g3">
      ${CARDS.map(([st,tip])=>`<div class="card">${chip(st)}<div class="bignum">${cnt(st)}</div><div class="muted">${tip}</div></div>`).join('')}
    </div>
    <h2 class="sec">本周留下的</h2>
    <div class="card">
      ${thisWeek.map(e=>`<div class="itemline"><div><div class="muted">${fmtMD(e.occurred_on)} · ${esc(e.kind)}</div><div class="desc">${esc(e.title||e.content.slice(0,42))}</div></div>${chip(e.status)}</div>`).join('') || '<div class="desc muted">这一周还没有留下记录。</div>'}
    </div>
    <h2 class="sec">每周洞察</h2>
    <div class="${ins?'card':'note'}">${ins ? `<div class="muted">${esc(ins.date)}</div><div class="desc" style="white-space:pre-wrap">${esc(ins.content_md)}</div>` : '每周日 Claude 会在这里写一段:什么在生长、什么在停滞、什么在等待。'}</div>`;
  $('#btn-export').onclick = async () => {
    const tables = ['entries','projects','project_updates','daily_state','lang_items','lang_checkins','mail_briefs','ai_insights'];
    const out = { version: 2, exportedAt: new Date().toISOString() };
    for (const t of tables) out[t] = await q(sb.from(t).select('*')) || [];
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([JSON.stringify(out,null,2)], {type:'application/json'}));
    a.download = 'insight-garden-' + todayStr() + '.json'; a.click();
    toast('花园已经装箱 📦');
  };
};

initAuth();
