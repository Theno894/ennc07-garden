<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>灵感花园 · Insight Garden</title>
<meta name="description" content="慢慢看见自己靠近了什么">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@600;900&family=Noto+Sans+SC:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --paper:#f2efe6; --paper2:#f7f5ee; --card:#fdfcf8; --line:#e5e1d3;
  --ink:#223428; --ink2:#41523f; --mute:#8a8d7c;
  --grow:#a9822c; --done:#4a6b52; --settle:#9c6a4e; --wait:#5f7d99; --seed:#6d7580; --release:#8d8d85;
  --accent:#2f4a3c; --danger:#a2543f;
  --serif:'Noto Serif SC',serif; --sans:'Noto Sans SC',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:linear-gradient(180deg,var(--paper) 0%,var(--paper2) 100%);color:var(--ink);font-family:var(--sans);min-height:100vh;font-size:15px;line-height:1.7}
a{color:inherit;text-decoration:none}
button{font-family:var(--sans);cursor:pointer;border:1px solid var(--line);background:var(--card);color:var(--ink);border-radius:10px;padding:8px 14px;font-size:14px;transition:.15s}
button:hover{border-color:var(--accent)}
button.primary{background:var(--accent);color:#fdfcf8;border-color:var(--accent)}
button.ghost{background:transparent;border:none;color:var(--mute);padding:4px 8px}
input,textarea,select{font-family:var(--sans);font-size:15px;color:var(--ink);background:var(--card);border:1px solid var(--line);border-radius:10px;padding:10px 12px;width:100%}
textarea{min-height:120px;resize:vertical;line-height:1.8}
input:focus,textarea:focus{outline:none;border-color:var(--accent)}

header.top{position:sticky;top:0;z-index:20;background:rgba(242,239,230,.92);backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
.topbar{max-width:1120px;margin:0 auto;display:flex;align-items:center;gap:18px;padding:14px 20px}
.logo{display:flex;align-items:center;gap:10px}
.logo svg{width:30px;height:30px}
.logo .t1{font-family:var(--serif);font-weight:900;font-size:19px;line-height:1.2}
.logo .t2{font-size:10px;letter-spacing:.25em;color:var(--mute)}
nav.desk{display:flex;gap:22px;margin-left:26px;font-size:14.5px}
nav.desk a{color:var(--ink2);padding:4px 2px;border-bottom:2px solid transparent}
nav.desk a.on{color:var(--ink);border-color:var(--accent);font-weight:500}
.top-right{margin-left:auto;display:flex;align-items:center;gap:14px;font-size:13.5px;color:var(--mute)}

main{max-width:1120px;margin:0 auto;padding:34px 20px 110px}
.eyebrow{font-size:12.5px;letter-spacing:.12em;color:var(--accent);font-weight:500;margin-bottom:10px}
h1.hero{font-family:var(--serif);font-weight:900;font-size:clamp(28px,4.6vw,44px);line-height:1.25;margin-bottom:10px}
.sub{color:var(--mute);margin-bottom:26px}
h2.sec{font-family:var(--serif);font-weight:600;font-size:21px;margin:34px 0 14px}

.grid{display:grid;gap:14px}
.g2{grid-template-columns:repeat(auto-fit,minmax(300px,1fr))}
.g3{grid-template-columns:repeat(auto-fit,minmax(240px,1fr))}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px 20px}
.card h3{font-family:var(--serif);font-weight:600;font-size:17.5px;margin:6px 0}
.card .desc{color:var(--ink2);font-size:14px}
.muted{color:var(--mute);font-size:13.5px}
.row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.spread{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}

.chip{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;border-radius:999px;padding:3px 11px;background:var(--paper);border:1px solid var(--line);color:var(--ink2)}
.chip .dot{width:7px;height:7px;border-radius:50%;background:var(--mute)}
.chip.seed .dot{background:var(--seed)} .chip.growing .dot{background:var(--grow)}
.chip.waiting .dot{background:var(--wait)} .chip.done .dot{background:var(--done)}
.chip.settled .dot{background:var(--settle)} .chip.released .dot{background:var(--release)}
.chip.sel{background:var(--accent);color:#fdfcf8;border-color:var(--accent)}
.chip.click{cursor:pointer}

.bar{height:7px;border-radius:99px;background:var(--paper);border:1px solid var(--line);overflow:hidden;margin:12px 0 6px}
.bar i{display:block;height:100%;background:linear-gradient(90deg,#5b7a5e,#31493a);border-radius:99px}

.bignum{font-family:var(--serif);font-weight:900;font-size:34px}
.note{background:#e7ebe9;border:1px solid #d5dcd8;border-radius:16px;padding:16px 20px}
.toast{position:fixed;left:50%;bottom:92px;transform:translateX(-50%);background:var(--accent);color:#fdfcf8;padding:10px 18px;border-radius:12px;font-size:14px;z-index:99;opacity:0;transition:.25s;pointer-events:none}
.toast.show{opacity:1}

nav.mob{display:none;position:fixed;left:12px;right:12px;bottom:12px;z-index:30;background:rgba(253,252,248,.95);border:1px solid var(--line);border-radius:20px;box-shadow:0 8px 30px rgba(34,52,40,.10);padding:8px 6px}
nav.mob .wrap{display:flex;justify-content:space-around;align-items:center}
nav.mob a{display:flex;flex-direction:column;align-items:center;gap:2px;font-size:11.5px;color:var(--mute);padding:4px 8px}
nav.mob a .ic{width:30px;height:30px;border-radius:50%;background:var(--paper);display:flex;align-items:center;justify-content:center;font-size:13px;font-family:var(--serif)}
nav.mob a.on{color:var(--ink)} nav.mob a.on .ic{background:var(--accent);color:#fdfcf8}

.login-wrap{max-width:420px;margin:12vh auto 0;padding:0 20px}
.login-card{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:30px 28px;text-align:center}
.login-card h1{font-family:var(--serif);font-weight:900;font-size:26px;margin-bottom:6px}
.login-card p{color:var(--mute);font-size:14px;margin-bottom:20px}
.login-card input{text-align:center;margin-bottom:12px}
.hidden{display:none!important}
.itemline{border-top:1px dashed var(--line);padding:10px 0;display:flex;gap:10px;align-items:flex-start;justify-content:space-between}
.itemline:first-of-type{border-top:none}
.exp{font-weight:500}
.small-in{width:auto;flex:1}
@media (max-width:760px){ nav.desk{display:none} nav.mob{display:block} main{padding-top:24px} }
</style>
</head>
<body>

<header class="top" id="hdr">
  <div class="topbar">
    <a class="logo" href="#today">
      <svg viewBox="0 0 32 32"><circle cx="13" cy="21" r="8" fill="#2f4a3c"/><path d="M14 20 C14 10, 22 4, 30 4 C30 14, 22 20, 14 20 Z" fill="#4a6b52"/></svg>
      <span><span class="t1">灵感花园</span><br><span class="t2">INSIGHT GARDEN</span></span>
    </a>
    <nav class="desk" id="nav-desk"></nav>
    <div class="top-right"><span id="date-label"></span><button class="ghost" id="btn-logout" title="退出登录">退出</button></div>
  </div>
</header>

<div class="login-wrap hidden" id="login-view">
  <div class="login-card">
    <h1>灵感花园</h1>
    <p>输入邮箱,花园会寄一把钥匙给你(魔法链接,免密码)。</p>
    <input type="email" id="login-email" placeholder="你的邮箱">
    <button class="primary" id="btn-magic" style="width:100%">发送登录链接</button>
    <p class="muted" id="login-msg" style="margin-top:14px"></p>
  </div>
</div>

<main id="view"></main>

<nav class="mob" id="nav-mob"></nav>
<div class="toast" id="toast"></div>

<script>
/* ================= 配置(部署时唯二要改的地方) ================= */
const SUPABASE_URL      = 'https://pclcxosllotopkrevqtp.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_JmFJq9iR32egjetXxvOTtw_Y88-BJEI'; // publishable key,可公开
const OWNER_NAME = 'Dou';

/* ================= 基础 ================= */
const configured = SUPABASE_URL.startsWith('https://');
const sb = configured ? supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY) : null;
let session = null;

const $  = s => document.querySelector(s);
const esc = s => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const todayStr = () => { const d = new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); };
const fmtMD = s => { if(!s) return ''; const d = new Date(s); return (d.getMonth()+1)+'/'+String(d.getDate()).padStart(2,'0'); };
function toast(msg){ const t=$('#toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2200); }
function greeting(){
  const h = new Date().getHours();
  const g = h<5?'夜深了':h<11?'早安':h<13?'午安':h<18?'午后好':h<23?'晚上好':'夜深了';
  return g + ',' + OWNER_NAME;
}
async function q(promise, silent){
  const { data, error } = await promise;
  if (error && !silent){ console.error(error); toast('出了点小差错:' + error.message.slice(0,40)); }
  return data;
}
const STATUS_ZH = {seed:'待处理', growing:'正在生长', waiting:'等待中', done:'已完成', settled:'已沉淀', released:'已放下'};
const chip = st => `<span class="chip ${st}"><span class="dot"></span>${STATUS_ZH[st]||st}</span>`;

/* ================= 导航与路由 ================= */
const TABS = [ ['today','今日','今'], ['capture','捕捉','＋'], ['grow','生长','芽'], ['projects','项目','进'], ['lang','语言温室','语'], ['review','回顾','看'] ];
function renderNav(){
  const cur = location.hash.replace('#','') || 'today';
  $('#nav-desk').innerHTML = TABS.map(([id,name]) => `<a href="#${id}" class="${cur===id?'on':''}">${name}</a>`).join('');
  $('#nav-mob').innerHTML = '<div class="wrap">' + TABS.map(([id,name,ic]) => `<a href="#${id}" class="${cur===id?'on':''}"><span class="ic">${ic}</span>${name}</a>`).join('') + '</div>';
  const d = new Date();
  $('#date-label').textContent = (d.getMonth()+1)+'月'+d.getDate()+'日 '+['周日','周一','周二','周三','周四','周五','周六'][d.getDay()];
}
/* ================= 登录 ================= */
async function initAuth(){
  if (!configured){
    $('#hdr').classList.add('hidden');
    $('#view').innerHTML = `<div class="login-wrap"><div class="login-card"><h1>还差一步</h1>
      <p>index.html 顶部的 SUPABASE_URL / SUPABASE_ANON_KEY 还没填。填好后花园就会醒来。</p></div></div>`;
    return false;
  }
  const { data } = await sb.auth.getSession();
  session = data.session;
  sb.auth.onAuthStateChange((_e, s) => { session = s; showApp(); });
  showApp();
  return true;
}
function showApp(){
  if (!session){
    $('#hdr').classList.add('hidden'); $('#nav-mob').classList.add('hidden');
    $('#login-view').classList.remove('hidden'); $('#view').innerHTML = '';
  } else {
    $('#hdr').classList.remove('hidden'); $('#nav-mob').classList.remove('hidden');
    $('#login-view').classList.add('hidden');
    route();
  }
}
async function sendMagic(){
  const email = $('#login-email').value.trim();
  if (!email) return;
  $('#login-msg').textContent = '寄送中…';
  const { error } = await sb.auth.signInWithOtp({ email, options: { emailRedirectTo: location.origin + location.pathname } });
  $('#login-msg').textContent = error ? ('没寄出去:' + error.message) : '钥匙已寄出,去邮箱点开那封信就能进来。';
}

/* ================= 路由 ================= */
const VIEWS = {};
async function route(){
  if (!session) return;
  renderNav();
  const cur = location.hash.replace('#','') || 'today';
  ($('#view').innerHTML = '<p class="muted">花园加载中…</p>');
  await (VIEWS[cur] || VIEWS.today)();
  window.scrollTo(0,0);
}

/* ================= 今日 ================= */
VIEWS.today = async function(){
  const today = todayStr();
  const [ds, projs, seeds, checkins, brief] = await Promise.all([
    q(sb.from('daily_state').select('*').eq('date', today).maybeSingle(), true),
    q(sb.from('projects').select('*').eq('status','growing').order('updated_at',{ascending:false}).limit(3)),
    q(sb.from('entries').select('*').in('status',['seed','growing']).order('updated_at',{ascending:false}).limit(3)),
    q(sb.from('lang_checkins').select('*').eq('date', today)),
    q(sb.from('mail_briefs').select('*').order('date',{ascending:false}).limit(1)),
  ]);
  const three = [...(projs||[]).map(p=>({t:'项目', title:p.name, desc:p.next_step||p.description||'', st:p.status})),
                 ...(seeds||[]).map(e=>({t:e.kind, title:e.title||e.content.slice(0,18), desc:e.next_step||'', st:e.status}))].slice(0,3);
  const en = (checkins||[]).find(c=>c.lang==='en'), ja = (checkins||[]).find(c=>c.lang==='ja');
  const b = (brief||[])[0];
  const energy = ds?.energy;
  const eBtn = (v,label,tip) => `<button data-energy="${v}" class="${energy===v?'primary':''}" style="flex:1;text-align:left"><b>${label}</b><br><span class="muted" style="font-size:12px">${tip}</span></button>`;
  $('#view').innerHTML = `
    <div class="eyebrow">${esc(greeting())}</div>
    <h1 class="hero">今天的花园,只照料此刻需要的部分。</h1>
    <p class="sub">不需要照顾整座花园,让一件事继续生长就好。</p>
    <div class="grid g2">
      <div class="card"><div class="muted">今日能量</div>
        <div class="row" style="margin-top:12px">${eBtn('low','低能量','适合轻轻整理')}${eBtn('mid','中等能量','可以稳定推进')}${eBtn('high','高能量','适合深度处理')}</div>
      </div>
      <div class="card"><div class="spread"><div class="muted">语言温室 · 今日</div><a href="#lang" class="muted">去打卡 →</a></div>
        <div class="row" style="margin-top:14px">
          <span class="chip ${en?'done':''}"><span class="dot"></span>英语 ${en?`已收 ${en.items_added} 条`:'还没浇水'}</span>
          <span class="chip ${ja?'done':''}"><span class="dot"></span>日语 ${ja?`已收 ${ja.items_added} 条`:'还没浇水'}</span>
        </div>
      </div>
    </div>
    <h2 class="sec">此刻值得照料的${three.length ? '' : '——花园还空着'}</h2>
    <div class="grid g3">
      ${three.map((x,i)=>`<div class="card"><div class="spread"><span class="muted">0${i+1} · ${esc(x.t)}</span>${chip(x.st)}</div>
        <h3>${esc(x.title)}</h3><div class="desc">${esc(x.desc)||'<span class="muted">下一步还没写下</span>'}</div></div>`).join('')
        || '<div class="card"><div class="desc">去「捕捉」写下第一句,或在「项目」里种一个开始。</div></div>'}
    </div>
    <h2 class="sec">邮件早报</h2>
    <div class="${b?'card':'note'}">
      ${b ? `<div class="spread"><b>${esc(b.date)} · 重要邮件 ${b.important_count} 封</b></div>
             <div class="desc" style="margin-top:8px;white-space:pre-wrap">${esc(b.summary_md||'')}</div>`
          : `早报还没送到过。Claude 每天早上 8 点会扫一遍邮箱,把值得看的放在这里。`}
    </div>`;
  document.querySelectorAll('[data-energy]').forEach(btn => btn.onclick = async () => {
    await q(sb.from('daily_state').upsert({ date: today, energy: btn.dataset.energy, updated_at: new Date().toISOString() }));
    toast('记下了,按这个步幅走'); route();
  });
};

/* ================= 捕捉 ================= */
VIEWS.capture = async function(){
  const recent = await q(sb.from('entries').select('*').order('created_at',{ascending:false}).limit(5)) || [];
  const KINDS = ['灵感','学习','项目','生活','英语','日语'];
  $('#view').innerHTML = `
    <div class="eyebrow">统一捕捉</div>
    <h1 class="hero">只需要说一次,花园会先保留原句</h1>
    <p class="sub">选择只是第一层整理;英语/日语会直接落进语言温室。</p>
    <div class="grid g2" style="grid-template-columns:1.6fr 1fr">
      <div class="card">
        <textarea id="cap-text" placeholder="写下一句话。它可以是想法、进展、身体感受,或刚学到的一句表达……"></textarea>
        <div class="row" style="margin:14px 0">${KINDS.map(k=>`<span class="chip click" data-kind="${k}">${k}</span>`).join('')}</div>
        <div class="spread"><span class="muted" id="cap-hint">写点什么,我猜猜它属于哪里</span><button class="primary" id="cap-save">种进花园</button></div>
      </div>
      <div class="card"><div class="muted">最近留下的原句</div>
        ${recent.map(e=>`<div class="itemline"><div><div class="muted">${esc(e.kind)} · ${fmtMD(e.occurred_on)}</div><div class="desc">${esc((e.title||e.content).slice(0,42))}</div></div>${chip(e.status)}</div>`).join('') || '<p class="muted" style="margin-top:10px">还没有记录</p>'}
      </div>
    </div>`;
  let kind = null;
  const chips = document.querySelectorAll('[data-kind]');
  const guess = t => {
    if (/[぀-ヿ]/.test(t)) return '日语';
    const ascii = (t.match(/[a-zA-Z\s'.,!?-]/g)||[]).length;
    if (t.length > 4 && ascii / t.length > 0.7) return '英语';
    if (/项目|上线|进度|交付|部署/.test(t)) return '项目';
    if (/学到|复习|背|读了|课/.test(t)) return '学习';
    if (/吃|睡|散步|家|买|身体/.test(t)) return '生活';
    return '灵感';
  };
  const syncChips = () => chips.forEach(c => c.classList.toggle('sel', c.dataset.kind === kind));
  chips.forEach(c => c.onclick = () => { kind = c.dataset.kind; syncChips(); });
  $('#cap-text').oninput = e => { if (!kind) { $('#cap-hint').textContent = '看起来像:' + guess(e.target.value); } };
  $('#cap-save').onclick = async () => {
    const text = $('#cap-text').value.trim();
    if (!text) return toast('先写点什么');
    const k = kind || guess(text);
    if (k === '英语' || k === '日语'){
      const lang = k === '英语' ? 'en' : 'ja';
      await q(sb.from('lang_items').insert({ lang, expression: text, source: 'manual' }));
      await bumpCheckin(lang, 1);
      toast(k + '表达已收进温室 🌱');
    } else {
      await q(sb.from('entries').insert({ kind: k, content: text, title: text.slice(0, 24), status: 'seed' }));
      toast('已种下,先安静待在「' + k + '」里');
    }
    $('#cap-text').value = ''; kind = null; syncChips(); route();
  };
};
async function bumpCheckin(lang, n){
  const today = todayStr();
  const cur = await q(sb.from('lang_checkins').select('*').eq('date',today).eq('lang',lang).maybeSingle(), true);
  await q(sb.from('lang_checkins').upsert({ date: today, lang, items_added: (cur?.items_added||0) + n }));
}
/* ================= 生长 ================= */
const NEXT_STATUS = { seed:['growing','released'], growing:['settled','done','waiting','released'], waiting:['growing','released'], settled:[], done:[], released:['seed'] };
VIEWS.grow = async function(filter){
  const all = await q(sb.from('entries').select('*').order('updated_at',{ascending:false})) || [];
  const f = typeof filter === 'string' ? filter : '全部';
  const list = f === '全部' ? all : all.filter(e => e.kind === f);
  $('#view').innerHTML = `
    <div class="eyebrow">正在生长</div>
    <h1 class="hero">最近的种子,不必马上成为答案</h1>
    <p class="sub">打开一颗种子,继续整理它的状态、连接和下一步。</p>
    <div class="row" style="margin-bottom:16px">${['全部','灵感','学习','项目','生活'].map(k=>`<span class="chip click ${k===f?'sel':''}" data-f="${k}">${k}</span>`).join('')}</div>
    <div class="grid g2">
      ${list.map(e=>`<div class="card">
        <div class="spread"><span class="muted">${esc(e.kind)} · ${fmtMD(e.occurred_on)}</span>${chip(e.status)}</div>
        <h3>${esc(e.title||'')}</h3>
        <div class="desc">${esc(e.content)}</div>
        <div class="row" style="margin-top:8px">${(e.tags||[]).map(t=>`<span class="chip">${esc(t)}</span>`).join('')}</div>
        <div style="border-top:1px solid var(--line);margin-top:12px;padding-top:10px">
          <div class="muted">下一步</div>
          <div class="desc" data-step="${e.id}" style="cursor:pointer">${esc(e.next_step)||'<span class="muted">点这里写下一步</span>'}</div>
        </div>
        <div class="row" style="margin-top:12px">
          ${(NEXT_STATUS[e.status]||[]).map(s=>`<button data-adv="${e.id}" data-to="${s}">${STATUS_ZH[s]}</button>`).join('')}
        </div>
      </div>`).join('') || '<div class="card"><div class="desc">这一类还没有种子。</div></div>'}
    </div>`;
  document.querySelectorAll('[data-f]').forEach(c => c.onclick = () => VIEWS.grow(c.dataset.f));
  document.querySelectorAll('[data-adv]').forEach(b => b.onclick = async () => {
    await q(sb.from('entries').update({ status: b.dataset.to, updated_at: new Date().toISOString() }).eq('id', b.dataset.adv));
    toast('状态已流转 → ' + STATUS_ZH[b.dataset.to]); VIEWS.grow(f);
  });
  document.querySelectorAll('[data-step]').forEach(d => d.onclick = async () => {
    const v = prompt('这颗种子的下一步:', d.textContent.trim());
    if (v === null) return;
    await q(sb.from('entries').update({ next_step: v, updated_at: new Date().toISOString() }).eq('id', d.dataset.step));
    VIEWS.grow(f);
  });
};

/* ================= 项目 ================= */
VIEWS.projects = async function(){
  const [projs, ups] = await Promise.all([
    q(sb.from('projects').select('*').order('updated_at',{ascending:false})),
    q(sb.from('project_updates').select('*').order('created_at',{ascending:false}).limit(30)),
  ]);
  const active = (projs||[]).filter(p=>p.status==='growing').length;
  $('#view').innerHTML = `
    <div class="eyebrow">项目与工作</div>
    <h1 class="hero">把下一步放在看得见的地方</h1>
    <p class="sub">${active} 项正在被照料,${(projs||[]).length - active} 项已经收好;进度仍由你判断,不用被数字追赶。</p>
    <div style="margin-bottom:16px"><button class="primary" id="p-add">＋ 种一个新项目</button></div>
    <div class="grid g3">
      ${(projs||[]).map(p=>{
        const notes = (ups||[]).filter(u=>u.project_id===p.id).slice(0,2);
        return `<div class="card">
          <div class="spread"><span class="chip">${esc(p.area||'项目')}</span>${chip(p.status)}</div>
          <h3>${esc(p.name)}</h3><div class="desc">${esc(p.description||'')}</div>
          <div class="bar"><i style="width:${p.progress}%"></i></div>
          <div class="spread"><span class="bignum" style="font-size:24px">${p.progress}%</span><span class="muted">${esc(p.next_step)||'下一步还没写下'}</span></div>
          ${notes.map(n=>`<div class="muted" style="margin-top:6px">· ${esc(n.note.slice(0,40))} <span style="opacity:.7">${fmtMD(n.created_at)}</span></div>`).join('')}
          <div class="row" style="margin-top:12px">
            <button data-pstep="${p.id}">记录一步</button>
            <button data-pprog="${p.id}" data-cur="${p.progress}">更新进展</button>
            ${p.status==='growing' ? `<button data-pdone="${p.id}">收进已完成</button>` : ''}
          </div>
        </div>`;
      }).join('') || '<div class="card"><div class="desc">还没有项目。</div></div>'}
    </div>`;
  $('#p-add').onclick = async () => {
    const name = prompt('项目名字:'); if (!name) return;
    const desc = prompt('一句话描述(可空):') || '';
    await q(sb.from('projects').insert({ name, description: desc }));
    toast('已种下新项目'); route();
  };
  document.querySelectorAll('[data-pstep]').forEach(b => b.onclick = async () => {
    const note = prompt('这一步做了什么:'); if (!note) return;
    await q(sb.from('project_updates').insert({ project_id: b.dataset.pstep, note }));
    await q(sb.from('projects').update({ updated_at: new Date().toISOString() }).eq('id', b.dataset.pstep));
    toast('已记下这一步'); route();
  });
  document.querySelectorAll('[data-pprog]').forEach(b => b.onclick = async () => {
    const v = prompt('现在进度(0-100):', b.dataset.cur); if (v === null) return;
    const n = Math.max(0, Math.min(100, parseInt(v)||0));
    await q(sb.from('projects').update({ progress: n, status: n>=100?'done':'growing', updated_at: new Date().toISOString() }).eq('id', b.dataset.pprog));
    route();
  });
  document.querySelectorAll('[data-pdone]').forEach(b => b.onclick = async () => {
    await q(sb.from('projects').update({ status:'done', updated_at: new Date().toISOString() }).eq('id', b.dataset.pdone));
    toast('这次行动已经结束,收好了'); route();
  });
};

/* ================= 语言温室 ================= */
async function calcStreak(){
  const rows = await q(sb.from('lang_checkins').select('date')) || [];
  const days = [...new Set(rows.map(r=>r.date))].sort().reverse();
  let streak = 0; const d = new Date();
  if (!days.includes(todayStr())) d.setDate(d.getDate()-1); // 今天还没打卡就从昨天数
  for (;;){
    const s = d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    if (days.includes(s)){ streak++; d.setDate(d.getDate()-1); } else break;
  }
  return streak;
}
VIEWS.lang = async function(){
  const today = todayStr();
  const [items, streak, insights] = await Promise.all([
    q(sb.from('lang_items').select('*').order('created_at',{ascending:false})),
    calcStreak(),
    q(sb.from('ai_insights').select('*').eq('scope','lang_monthly').order('date',{ascending:false}).limit(1)),
  ]);
  const due = (items||[]).filter(i => !i.mastered && (!i.last_reviewed_at ||
    (Date.now() - new Date(i.last_reviewed_at).getTime()) > Math.pow(2, i.review_count) * 86400000)).slice(0,6);
  const col = lang => {
    const todays = (items||[]).filter(i => i.lang===lang && i.created_at.slice(0,10)===today);
    const label = lang==='en'?'英语':'日语';
    return `<div class="card">
      <div class="spread"><b>${label}</b><span class="muted">今天收了 ${todays.length} 条</span></div>
      ${todays.map(i=>`<div class="itemline"><div><div class="exp">${esc(i.expression)}</div><div class="muted">${esc(i.meaning||'')}</div></div></div>`).join('')}
      <div class="row" style="margin-top:12px">
        <input class="small-in" id="add-${lang}" placeholder="新表达">
        <input class="small-in" id="add-${lang}-m" placeholder="意思(可空)">
        <button class="primary" data-addlang="${lang}">收</button>
      </div></div>`;
  };
  const ins = (insights||[])[0];
  $('#view').innerHTML = `
    <div class="eyebrow">语言温室</div>
    <h1 class="hero">已经连续生长 ${streak} 天</h1>
    <p class="sub">每一条表达都是一颗种子;复习是浇水,不是考试。</p>
    <div class="grid g2">${col('en')}${col('ja')}</div>
    <h2 class="sec">今天该浇水的(${due.length})</h2>
    <div class="grid g2">
      ${due.map(i=>`<div class="card"><div class="spread"><span class="chip">${i.lang==='en'?'英语':'日语'}</span><span class="muted">浇过 ${i.review_count} 次</span></div>
        <h3>${esc(i.expression)}</h3><div class="desc">${esc(i.meaning||'')}</div>
        <div class="row" style="margin-top:12px">
          <button data-rev="${i.id}" data-c="${i.review_count}">记得 ✓</button>
          <button data-master="${i.id}">已经长成了 🌿</button>
        </div></div>`).join('') || '<div class="card"><div class="desc">今天没有需要浇水的表达,温室很安静。</div></div>'}
    </div>
    <h2 class="sec">月度收获</h2>
    <div class="${ins?'card':'note'}">${ins ? `<div class="muted">${esc(ins.date)}</div><div class="desc" style="white-space:pre-wrap">${esc(ins.content_md)}</div>` : '月底 Claude 会在这里写一段:你这个月的语言在怎样生长。'}</div>`;
  document.querySelectorAll('[data-addlang]').forEach(b => b.onclick = async () => {
    const lang = b.dataset.addlang;
    const exp = $('#add-'+lang).value.trim(); if (!exp) return;
    await q(sb.from('lang_items').insert({ lang, expression: exp, meaning: $('#add-'+lang+'-m').value.trim() || null, source:'manual' }));
    await bumpCheckin(lang, 1); toast('收进温室了 🌱'); route();
  });
  document.querySelectorAll('[data-rev]').forEach(b => b.onclick = async () => {
    await q(sb.from('lang_items').update({ review_count: parseInt(b.dataset.c)+1, last_reviewed_at: new Date().toISOString() }).eq('id', b.dataset.rev));
    toast('浇过水了'); route();
  });
  document.querySelectorAll('[data-master]').forEach(b => b.onclick = async () => {
    await q(sb.from('lang_items').update({ mastered: true }).eq('id', b.dataset.master));
    toast('这颗已经长成 🌿'); route();
  });
};

/* ================= 回顾 ================= */
VIEWS.review = async function(){
  const [entries, projs, insights] = await Promise.all([
    q(sb.from('entries').select('*')),
    q(sb.from('projects').select('*')),
    q(sb.from('ai_insights').select('*').eq('scope','weekly_review').order('date',{ascending:false}).limit(1)),
  ]);
  const all = [...(entries||[]).map(e=>({st:e.status})), ...(projs||[]).map(p=>({st:p.status}))];
  const cnt = st => all.filter(x=>x.st===st).length;
  const CARDS = [ ['seed','值得关注,但还没有开始'], ['growing','已经开始,也有下一步'], ['waiting','暂时交给外部条件'], ['done','这次行动已经结束'], ['settled','已经形成可复用的成果'], ['released','经过判断后安心不再继续'] ];
  const weekAgo = new Date(Date.now() - 6*86400000);
  const thisWeek = (entries||[]).filter(e => new Date(e.occurred_on) >= weekAgo)
    .sort((a,b)=>b.occurred_on.localeCompare(a.occurred_on));
  const ins = (insights||[])[0];
  const total = (entries||[]).length;
  $('#view').innerHTML = `
    <div class="eyebrow">这一周的生长</div>
    <h1 class="hero">慢慢看见自己靠近了什么</h1>
    <p class="sub">${total} 条记录留在花园里,${cnt('done')+cnt('settled')} 项已经完成或沉淀。</p>
    <div class="spread" style="margin-bottom:14px"><span></span><button id="btn-export">导出花园数据</button></div>
    <div class="grid g3">
      ${CARDS.map(([st,tip])=>`<div class="card">${chip(st)}<div class="bignum">${cnt(st)}</div><div class="muted">${tip}</div></div>`).join('')}
    </div>
    <h2 class="sec">本周留下的</h2>
    <div class="card">
      ${thisWeek.map(e=>`<div class="itemline"><div><div class="muted">${fmtMD(e.occurred_on)} · ${esc(e.kind)}</div><div class="desc">${esc(e.title||e.content.slice(0,42))}</div></div>${chip(e.status)}</div>`).join('') || '<div class="desc muted">这一周还没有留下记录。</div>'}
    </div>
    <h2 class="sec">每周洞察</h2>
    <div class="${ins?'card':'note'}">${ins ? `<div class="muted">${esc(ins.date)}</div><div class="desc" style="white-space:pre-wrap">${esc(ins.content_md)}</div>` : '每周日 Claude 会在这里写一段:什么在生长、什么在停滞、什么在等待。'}</div>`;
  $('#btn-export').onclick = async () => {
    const tables = ['entries','projects','project_updates','daily_state','lang_items','lang_checkins','mail_briefs','ai_insights'];
    const out = { version: 2, exportedAt: new Date().toISOString() };
    for (const t of tables) out[t] = await q(sb.from(t).select('*')) || [];
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([JSON.stringify(out,null,2)], {type:'application/json'}));
    a.download = 'insight-garden-' + todayStr() + '.json'; a.click();
    toast('花园已经装箱 📦');
  };
};
